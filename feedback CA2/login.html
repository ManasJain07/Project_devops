<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background-image: url('./lang.jpeg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .login-box {
            position: relative;
            width: 380px;
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .login-box h2 {
            margin: 0 0 8px;
            color: #0d2c54;
            font-size: 28px;
        }

        .login-box p {
            margin: 0 0 24px;
            color: #555;
            font-size: 14px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s ease;
            background: #f9fbfd;
        }

        .input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            background: #fff;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 20px;
            font-size: 13px;
            color: #444;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .options a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
        }

        .options a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
        }

        .footer-text {
            margin-top: 18px;
            font-size: 13px;
            color: #666;
        }

        .footer-text a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        function login() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();

            if (username === "admin" && password === "admin123") {
                alert("Login successful!");
                window.location.href = "index.html";
            } else {
                alert("Invalid username or password");
            }
        }
    </script>
</head>

<body>
    <div class="login-box">
        <h2>Welcome Back</h2>
        <p>Login to continue to the registration form</p>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter Username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button onclick="login()">Login</button>

        <div class="footer-text">
            Use <b>admin</b> / <b>admin123</b>
        </div>
    </div>
</body>
</html>
